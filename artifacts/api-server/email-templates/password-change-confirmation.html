<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подтверждение смены пароля — Readora</title>
  </head>
  <body style="margin:0;padding:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Ubuntu,'Helvetica Neue',Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:28px 24px 16px 24px;text-align:center;">
                <img src="{{logoUrl}}" alt="Readora" style="height:30px;width:auto;" />
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 8px 24px;">
                <h1 style="margin:0;font-size:22px;line-height:1.3;color:#111827;">Подтверждение смены пароля</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 20px 24px;font-size:15px;line-height:1.6;color:#374151;">
                <p style="margin:0 0 12px 0;">Здравствуйте, {{username}}!</p>
                <p style="margin:0 0 12px 0;">Вы запросили смену пароля в Readora. Чтобы применить новый пароль, подтвердите действие:</p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 24px 24px;" align="center">
                <a href="{{confirmUrl}}" style="display:inline-block;background:#111827;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:10px;font-weight:600;">Подтвердить смену пароля</a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 24px 24px;font-size:13px;line-height:1.6;color:#6b7280;">
                <p style="margin:0 0 10px 0;">Ссылка действительна 1 час.</p>
                <p style="margin:0;">Если это были не вы, просто проигнорируйте это письмо — пароль не изменится.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
