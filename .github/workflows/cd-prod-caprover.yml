name: CD - production (CapRover)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: caprover-production
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.24.0"
      - name: Use npm registry
        run: |
          if [ -f .npmrc ]; then mv .npmrc .npmrc.ci.bak; fi
          pnpm config set registry https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm run check

  deploy:
    name: Deploy to CapRover
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install CapRover CLI
        run: npm install -g caprover
      - name: Deploy app to CapRover
        run: |
          caprover deploy \
            --caproverUrl "${{ secrets.CAPROVER_SERVER }}" \
            --caproverApp "${{ secrets.CAPROVER_APP }}" \
            --branch "${{ github.ref_name }}" \
            --appToken "${{ secrets.CAPROVER_APP_TOKEN }}"
      - name: Post-deploy health check
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://readora.ru || true)
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "Health check passed with HTTP $code"
              exit 0
            fi
            echo "Attempt $i: HTTP $code, waiting for rollout"
            sleep 10
          done
          echo "Health check failed: readora.ru did not become healthy"
          exit 1